[build]
# Commande d'installation des dépendances PHP
builder = "RAILPACK"
buildCommand = "npm run build"

[deploy]
# Démarrage du serveur web PHP via le Procfile
preDeployCommand = "php artisan config:cache && php artisan route:cache && php artisan view:cache"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[environment]
# Variables injectées automatiquement par Railway — ne pas dupliquer dans .env
# APP_URL sera défini manuellement dans le tableau de bord Railway


